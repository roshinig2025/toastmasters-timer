<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Toastmasters Timer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css?family=Roboto:400,700|Roboto+Mono:400,700" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div id="wrapper">
    <button id="infoButton" aria-label="Show info">i</button>

    <div class="sidebar">
      <div class="section" id="predefined">
        <label class="option">
          <input type="radio" id="tableTopics" name="predefinedOption" value="tableTopics" checked>
          <span class="label">Table Topics</span>
        </label>

        <label class="option">
          <input type="radio" id="evaluation" name="predefinedOption" value="evaluation">
          <span class="label">Evaluation</span>
        </label>

        <label class="option">
          <input type="radio" id="speech" name="predefinedOption" value="speech">
          <span class="label">Speech</span>
        </label>

        <label class="option">
          <input type="radio" id="gracePeriod" name="predefinedOption" value="gracePeriod">
          <span class="label">30s grace period</span>
        </label>

        <label class="option">
          <input type="radio" id="iceBreaker" name="predefinedOption" value="iceBreaker">
          <span class="label">Ice Breaker</span>
        </label>

        <label class="option">
          <input type="radio" id="custom" name="predefinedOption" value="custom">
          <span class="label">Custom</span>
        </label>
      </div>

      <div class="section">
        <label class="option">
          <span>Green</span>
          <span class="label"></span>
          <input type="text" id="customGreenLight" value="1:00">
        </label>

        <label class="option">
          <span>Yellow</span>
          <span class="label"></span>
          <input type="text" id="customYellowLight" value="1:30">
        </label>

        <label class="option">
          <span>Red</span>
          <span class="label"></span>
          <input type="text" id="customRedLight" value="2:00">
        </label>

        <label class="option">
          <span>DQ</span>
          <span class="label"></span>
          <input type="text" id="customDq" value="2:30">
        </label>

        <label class="option">
          <input type="checkbox" id="showClock" checked>
          <span class="label">Show clock</span>
        </label>
      </div>

      <div id="controls">
        <button class="option" id="controlButton">Start</button>
        <button class="option" id="resetButton">Reset</button>
      </div>
    </div>

    <div class="clockWrapper">
      <div class="clockInnerWrapper">
        <div class="clock" id="clock">00:00</div>
      </div>
    </div>

    <div class="grower" id="grower"></div>

    <div id="info" aria-hidden="true">
      <div class="info__inner">
        <h2>Toastmasters Timer</h2>
        <p>Choose a preset or use custom timing.</p>
        <p>Space bar starts and stops the timer.</p>
        <p>Colors change automatically at the configured times.</p>
      </div>
    </div>
  </div>

  <script src="./app.js"></script>
</body>
</html>
